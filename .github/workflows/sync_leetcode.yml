name: Sync LeetCode to GitHub
on:
  workflow_dispatch:      # Allows you to run it manually anytime
  schedule:
    - cron: "0 8 * * *"   # Runs automatically every day at 8:00 AM UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Submissions
        uses: joshcai/leetcode-sync@v1.7
        with:
          # Your GitHub personal access token is automatically provided by GitHub Actions
          github-token: ${{ github.token }}
          
          # These refer to the secrets you created in your Repo Settings
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          
          # Optional: Name of the folder where code will be saved
          destination-folder: 'solutions'
          
          # Optional: Group by language (set to 'false' if you want all in one list)
          verbose: true
          commit-header: '[LeetCode Sync]'
